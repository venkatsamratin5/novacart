<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Global E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar { background: linear-gradient(90deg, #ff416c, #ff4b2b); }
        .product-card { border: none; border-radius: 15px; transition: transform 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-10px); }
        .emoji-icon { font-size: 4rem; text-align: center; margin: 20px 0; }
        .btn-cart { background-color: #ff4b2b; color: white; border: none; font-weight: bold; width: 100%; border-radius: 8px;}
        .btn-cart:hover { background-color: #ff416c; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">🛍️ NovaCart</a>
            <button class="btn btn-light position-relative">
                🛒 Cart
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">3</span>
            </button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="fw-bold">Trending Tech</h1>
                <p class="text-muted">Discover the latest in premium electronics</p>
            </div>
        </div>
        <div class="row g-4" id="productGrid">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/store/products')
                .then(response => response.json())
                .then(products => {
                    const grid = document.getElementById('productGrid');
                    products.forEach(p => {
                        const stockColor = p.stock === 'In Stock' ? 'text-success' : 'text-danger';
                        const card = `
                            <div class="col-md-4">
                                <div class="card product-card h-100 p-3 bg-white">
                                    <div class="emoji-icon">${p.image}</div>
                                    <div class="card-body text-center">
                                        <h5 class="card-title fw-bold">${p.name}</h5>
                                        <h4 class="text-primary mt-3">$${p.price.toFixed(2)}</h4>
                                        <p class="${stockColor} fw-bold small">${p.stock}</p>
                                    </div>
                                    <div class="card-footer bg-transparent border-0">
                                        <button class="btn btn-cart p-2">Add to Cart</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                });
        });
    </script>
</body>
</html>
